<!doctype html>
<html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>Schedule</title><style>
:root{--bg:#f6f2ea;--paper:#fffdf8;--ink:#1d2430;--muted:#747d8a;--line:#ded7cb;--head:#e8ecf3;--stripe:#f8f4ec;--accent:#1f2f4a}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,"Malgun Gothic",sans-serif}.page{max-width:980px;margin:22px auto;padding:0 14px}.sheet{background:var(--paper);border:1px solid var(--line);box-shadow:0 10px 26px rgba(45,38,28,.08)}header{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;padding:26px 28px 18px;border-bottom:1px solid var(--line)}.date{font-size:30px;font-weight:900}.weekday{margin-top:4px;color:var(--accent);font-size:14px;font-weight:900}h1{margin:0;color:#2c3340;font-size:24px;font-weight:900}main{padding:20px 24px 24px}section+section{margin-top:24px}.section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}h2{margin:0;font-size:18px;font-weight:900}table{width:100%;border-collapse:collapse;background:#fff;border-top:2px solid var(--accent)}th,td{padding:13px 12px;border-bottom:1px solid var(--line);text-align:left;font-size:14px;vertical-align:middle}th{background:var(--head);font-size:13px;color:#313946}tbody tr:nth-child(even){background:var(--stripe)}td:first-child{width:54px;color:var(--muted);font-weight:800}td:nth-child(2),td:nth-child(3){font-weight:900}.time{font-weight:900;white-space:nowrap}.night{display:inline-block;margin-left:6px;padding:2px 6px;border-radius:4px;background:#fff0d2;color:#805800;font-size:12px;font-weight:900}.empty{padding:26px;text-align:center;color:var(--muted);background:#fff;border:1px dashed var(--line)}@media(max-width:720px){.page{margin:8px auto;padding:0 8px}.sheet{box-shadow:none}header{display:block;padding:22px 18px 16px}.date{font-size:27px}h1{margin-top:10px;font-size:22px}main{padding:14px 10px}thead{display:none}tbody{display:grid;gap:8px}tr{display:grid;grid-template-columns:42px 1fr;border:1px solid var(--line);background:#fff!important;padding:8px}td{border:0;padding:5px 4px}td:first-child{grid-row:span 4}td::before{display:block;color:var(--muted);font-size:12px;font-weight:800}td:nth-child(2)::before{content:"\ACE0\AC1D ID"}td:nth-child(3)::before{content:"\D50C\B808\C774\C5B4"}td:nth-child(4)::before{content:"\C2DC\AC04"}td:nth-child(5)::before{content:"\C0AC\B0E5\D130"}}
</style></head><body><div class="page"><div class="sheet"><header><div><div class="date" id="dateText"></div><div class="weekday" id="weekdayText"></div></div><h1>SCHEDULE</h1></header><main><section><div class="section-head"><h2>&#50724;&#45720; &#49828;&#52992;&#51460;</h2></div><div id="todayTable"></div></section><section><div class="section-head"><h2>&#45236;&#51068; &#49828;&#52992;&#51460;</h2></div><div id="tomorrowTable"></div></section></main></div></div><script>
const PUBLIC_DATA={"generatedAt":"2026. 5. 27. 20시 9분 23초","rows":[{"date":"2026-05-27","customer":"한늑대","player":"ben","startTime":"11:00","endTime":"23:00","huntingGround":"PC 타락, 용던3F"},{"date":"2026-05-27","customer":"비운","player":"raymark","startTime":"22:00","endTime":"10:00","huntingGround":"글루디오던전 4,5F"},{"date":"2026-05-27","customer":"미니","player":"Nogs","startTime":"23:00","endTime":"11:00","huntingGround":"글루디오던전 5,6F"},{"date":"2026-05-27","customer":"한늑대","player":"crit","startTime":"23:00","endTime":"11:00","huntingGround":"PC 타락, 용던3F"}]};
const LABEL={customer:'\uACE0\uAC1D ID',player:'\uD50C\uB808\uC774\uC5B4',time:'\uC2DC\uAC04',place:'\uC0AC\uB0E5\uD130',empty:'\uD45C\uC2DC\uD560 \uC2A4\uCF00\uC904\uC774 \uC5C6\uC2B5\uB2C8\uB2E4.',night:'\uC57C\uAC04',next:'\uC775\uC77C'};
const pad=n=>String(n).padStart(2,"0"),dateISO=d=>d.getFullYear()+"-"+pad(d.getMonth()+1)+"-"+pad(d.getDate()),dayEN=["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];const addDays=(date,days)=>{const [y,m,d]=date.split("-").map(Number);const x=new Date(y,m-1,d);x.setDate(x.getDate()+days);return dateISO(x)};const esc=v=>String(v??"").replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]));const isNight=r=>r.endTime<=r.startTime;const timeText=r=>isNight(r)?r.startTime+" ~ "+LABEL.next+" "+r.endTime:r.startTime+" ~ "+r.endTime;function table(rows){if(!rows.length)return '<div class="empty">'+LABEL.empty+'</div>';return '<table><thead><tr><th>NO</th><th>'+LABEL.customer+'</th><th>'+LABEL.player+'</th><th>'+LABEL.time+'</th><th>'+LABEL.place+'</th></tr></thead><tbody>'+rows.map((r,i)=>'<tr><td>'+pad(i+1)+'</td><td>'+esc(r.customer)+'</td><td>'+esc(r.player)+'</td><td class="time">'+esc(timeText(r))+(isNight(r)?'<span class="night">'+LABEL.night+'</span>':'')+'</td><td>'+esc(r.huntingGround)+'</td></tr>').join('')+'</tbody></table>'}function render(){const now=new Date();const today=dateISO(now);const tomorrow=addDays(today,1);const [y,m,d]=today.split('-').map(Number);const dt=new Date(y,m-1,d);const rows=PUBLIC_DATA.rows.slice().sort((a,b)=>(a.date+a.startTime+a.customer+a.player).localeCompare(b.date+b.startTime+b.customer+b.player));document.getElementById('dateText').textContent=y+'.'+pad(m)+'.'+pad(d);document.getElementById('weekdayText').textContent=dayEN[dt.getDay()];document.getElementById('todayTable').innerHTML=table(rows.filter(r=>r.date===today));document.getElementById('tomorrowTable').innerHTML=table(rows.filter(r=>r.date===tomorrow));}render();
</script></body></html>
