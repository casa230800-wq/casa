const pad = n => String(n).padStart(2,"0");
const dateISO = d => d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());
const addDays = (date, days) => { const [y,m,d] = date.split("-").map(Number); const x = new Date(y,m-1,d); x.setDate(x.getDate()+days); return dateISO(x); };
const toDate = (date,time) => { const [y,m,d] = date.split("-").map(Number); const [hh,mm] = time.split(":").map(Number); return new Date(y,m-1,d,hh||0,mm||0,0,0); };
const esc = v => String(v ?? "").replace(/[&<>"']/g, ch => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[ch]));

const timeText = r => isNight(r) ? r.startTime + "~익일 " + r.endTime : r.startTime + "~" + r.endTime;
const startDateTime = r => toDate(r.date, r.startTime);
const endDateTime = r => toDate(r.endDate, r.endTime);
let mode = "current";
document.getElementById("generatedAt").textContent = PUBLIC_DATA.generatedAt;
document.getElementById("pickDate").value = dateISO(new Date());
function sortedRows(){ return PUBLIC_DATA.rows.slice().sort((a,b) => startDateTime(a)-startDateTime(b) || a.customer.localeCompare(b.customer)); }
function rowsForMode(){ const now=new Date(); const today=dateISO(now); const tomorrow=addDays(today,1); const picked=document.getElementById("pickDate").value||today; const rows=sortedRows(); if(mode==="current") return {title:"진행중 스케줄",note:"지금 시간 기준 진행중인 스케줄입니다.",rows:rows.filter(r=>now>=startDateTime(r)&&now<endDateTime(r))}; if(mode==="next") return {title:"다음 출근",note:"현재 이후 시작하는 스케줄입니다.",rows:rows.filter(r=>startDateTime(r)>=now)}; if(mode==="today") return {title:today+" 시작 스케줄",note:"오늘 시작하는 스케줄입니다.",rows:rows.filter(r=>r.date===today)}; if(mode==="tomorrow") return {title:tomorrow+" 시작 스케줄",note:"내일 시작하는 스케줄입니다.",rows:rows.filter(r=>r.date===tomorrow)}; if(mode==="date") return {title:picked+" 시작 스케줄",note:"선택한 날짜에 시작하는 스케줄입니다.",rows:rows.filter(r=>r.date===picked)}; return {title:"전체 스케줄",note:"등록된 공개 스케줄 전체입니다.",rows}; }
function render(){ document.querySelectorAll("button[data-mode]").forEach(btn=>btn.classList.toggle("active",btn.dataset.mode===mode)); const view=rowsForMode(); document.getElementById("caption").textContent=view.title; document.getElementById("modeNote").textContent=view.note; document.getElementById("count").textContent=view.rows.length+"개"; document.getElementById("table").innerHTML=view.rows.length?'<table><thead><tr><th>NO</th><th>고객 ID</th><th>플레이어</th><th>시간</th><th>근무</th><th>사냥터</th></tr></thead><tbody>'+view.rows.map((r,i)=>'<tr><td>'+pad(i+1)+'</td><td><b>'+esc(r.customer)+'</b></td><td><b>'+esc(r.player)+'</b></td><td class="time">'+esc(timeText(r))+'</td><td><b>'+esc(r.hours)+'</b></td><td>'+esc(r.huntingGround)+'</td></tr>').join("")+'</tbody></table>':'<div class="empty">표시할 스케줄이 없습니다.</div>'; }
document.querySelectorAll("button[data-mode]").forEach(btn=>btn.addEventListener("click",()=>{mode=btn.dataset.mode;render();}));
