<style>
  :root{--bg:#f6f2ea;--paper:#fffdf8;--ink:#1d2430;--muted:#747d8a;--line:#ded7cb;--head:#e8ecf3;--stripe:#f8f4ec;--accent:#1f2f4a}
  *{box-sizing:border-box}
  body{margin:0;background:var(--bg);color:var(--ink);font-family:Arial,"Malgun Gothic",sans-serif}
  .page{max-width:980px;margin:22px auto;padding:0 14px}
  .sheet{background:var(--paper);border:1px solid var(--line);box-shadow:0 10px 26px rgba(45,38,28,.08)}
  header{display:flex;justify-content:space-between;align-items:flex-end;gap:18px;padding:26px 28px 18px;border-bottom:1px solid var(--line)}
  .date{font-size:30px;font-weight:900;letter-spacing:0}
  .weekday{margin-top:4px;color:var(--accent);font-size:14px;font-weight:900}
  h1{margin:0;color:#2c3340;font-size:24px;font-weight:900;letter-spacing:0}
  main{padding:20px 24px 24px}
  section+section{margin-top:24px}
  .section-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
  h2{margin:0;font-size:18px;font-weight:900}
  .count{color:var(--muted);font-size:13px;font-weight:800}
  table{width:100%;border-collapse:collapse;background:#fff;border-top:2px solid var(--accent)}
  th,td{padding:13px 12px;border-bottom:1px solid var(--line);text-align:left;font-size:14px;vertical-align:middle}
  th{background:var(--head);font-size:13px;color:#313946}
  tbody tr:nth-child(even){background:var(--stripe)}
  td:first-child{width:54px;color:var(--muted);font-weight:800}
  td:nth-child(2),td:nth-child(3){font-weight:900}
  .time{font-weight:900;white-space:nowrap}
  .night{display:inline-block;margin-left:6px;padding:2px 6px;border-radius:4px;background:#fff0d2;color:#805800;font-size:12px;font-weight:900}
  .empty{padding:26px;text-align:center;color:var(--muted);background:#fff;border:1px dashed var(--line)}
  @media(max-width:720px){
    .page{margin:8px auto;padding:0 8px}.sheet{box-shadow:none}header{display:block;padding:22px 18px 16px}.date{font-size:27px}h1{margin-top:10px;font-size:22px}main{padding:14px 10px}
    table{border-top:2px solid var(--accent)}thead{display:none}tbody{display:grid;gap:8px}tr{display:grid;grid-template-columns:42px 1fr;border:1px solid var(--line);background:#fff!important;padding:8px}td{border:0;padding:5px 4px}td:first-child{grid-row:span 4}td::before{display:block;color:var(--muted);font-size:12px;font-weight:800}td:nth-child(2)::before{content:"고객 ID"}td:nth-child(3)::before{content:"플레이어"}td:nth-child(4)::before{content:"시간"}td:nth-child(5)::before{content:"사냥터"}
  }
</style>
</head>

const pad = n => String(n).padStart(2,"0");
const dateISO = d => d.getFullYear() + "-" + pad(d.getMonth()+1) + "-" + pad(d.getDate());
const dayEN = ["SUNDAY","MONDAY","TUESDAY","WEDNESDAY","THURSDAY","FRIDAY","SATURDAY"];
const addDays = (date, days) => { const [y,m,d] = date.split("-").map(Number); const x = new Date(y,m-1,d); x.setDate(x.getDate()+days); return dateISO(x); };
const toDate = (date,time) => { const [y,m,d] = date.split("-").map(Number); const [hh,mm] = time.split(":").map(Number); return new Date(y,m-1,d,hh||0,mm||0,0,0); };
const esc = v => String(v ?? "").replace(/[&<>"']/g, ch => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[ch]));
const isNight = r => r.endDate !== r.date || r.endTime <= r.startTime;
const timeText = r => isNight(r) ? r.startTime + " ~ 익일 " + r.endTime : r.startTime + " ~ " + r.endTime;
const startDateTime = r => toDate(r.date, r.startTime);
const sortedRows = () => PUBLIC_DATA.rows.slice().sort((a,b) => startDateTime(a) - startDateTime(b) || a.customer.localeCompare(b.customer));
function table(rows) {
  if (!rows.length) return '<div class="empty">표시할 스케줄이 없습니다.</div>';
  return '<table><thead><tr><th>NO</th><th>고객 ID</th><th>플레이어</th><th>시간</th><th>사냥터</th></tr></thead><tbody>' + rows.map((r,i) => '<tr><td>'+pad(i+1)+'</td><td>'+esc(r.customer)+'</td><td>'+esc(r.player)+'</td><td class="time">'+esc(timeText(r))+(isNight(r)?'<span class="night">야간</span>':'')+'</td><td>'+esc(r.huntingGround)+'</td></tr>').join("") + '</tbody></table>';
}
function render() {
  const now = new Date();
  const today = dateISO(now);
  const tomorrow = addDays(today, 1);
  const rows = sortedRows();
  const [y,m,d] = today.split("-").map(Number);
  const dt = new Date(y,m-1,d);
  const todayRows = rows.filter(r => r.date === today);
  const tomorrowRows = rows.filter(r => r.date === tomorrow);
  document.getElementById("dateText").textContent = y + "." + pad(m) + "." + pad(d);
  document.getElementById("weekdayText").textContent = dayEN[dt.getDay()];
  document.getElementById("todayTable").innerHTML = table(todayRows);
  document.getElementById("tomorrowTable").innerHTML = table(tomorrowRows);
}
render();
